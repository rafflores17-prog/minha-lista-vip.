<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP_PAINEL APKBUGADO</title>
    <style>
        /* Estilo Centralizado e Compacto */
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        /* O Painel da Foto */
        .painel-container {
            width: 90%;
            max-width: 380px;
            background: #000;
            border: 2px solid #00ff9c;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 156, 0.5);
            text-align: center;
        }

        .titulo {
            color: #00ff9c;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .cadeado-img {
            width: 150px;
            margin-bottom: 20px;
        }

        /* Botões Superiores Lado a Lado */
        .grid-botoes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-link {
            background: rgba(0, 255, 156, 0.1);
            border: 1px solid #00ff9c;
            color: #00ff9c;
            padding: 10px;
            border-radius: 10px;
            font-size: 11px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Inputs e Botões de Ação */
        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            margin-bottom: 10px;
            box-sizing: border-box;
            text-align: center;
        }

        .btn-gerar {
            width: 100%;
            padding: 15px;
            background: #00ff9c;
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 0 10px #00ff9c;
            text-transform: uppercase;
        }

        /* 🛡️ BOX DE RESULTADO (SEM BUG) */
        .resultado-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 15px;
            margin-top: 15px;
            padding: 15px;
            text-align: left;
            font-size: 12px;
            color: #fff;
            line-height: 1.5;
            /* Trava de segurança para o link M3U */
            white-space: pre-wrap;
            word-break: break-all;
        }

        .status {
            color: #00ff9c;
            font-size: 11px;
            margin: 10px 0;
            font-weight: bold;
        }

        .btn-copiar {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: #00ff9c;
            border: 1px solid #00ff9c;
            border-radius: 10px;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="painel-container">
    <div class="titulo">[ VIP_PAINEL ]</div>
    
    <img src="1000156293.png" class="cadeado-img" alt="VIP">

    <div class="grid-botoes">
        <a href="https://t.me/ApkBugadoGrupo" class="btn-link">💎 GRUPO VIP</a>
        <a href="https://t.me/ApkBugado" class="btn-link">📢 CANAL</a>
    </div>

    <div id="login-section">
        <input type="password" id="codigo" placeholder="Digite código VIP">
        <button class="btn-gerar" onclick="entrar()">DESBLOQUEAR</button>
    </div>

    <div id="main-section" style="display:none;">
        <button class="btn-gerar" onclick="gerarLista()">⚡ GERAR NOVA LISTA PREMIUM</button>
        
        <div class="status" id="status-txt">🟢 STATUS: AGUARDANDO</div>

        <div class="resultado-box" id="output">
            💎 VIP APKBUGADO PREMIUM<br><br>
            Aguardando comando...
        </div>

        <button class="btn-copiar" onclick="copiar()">📋 COPIAR DADOS</button>
    </div>
</div>

<script>
    function entrar() {
        if(document.getElementById('codigo').value === "1234") {
            document.getElementById('login-section').style.display = "none";
            document.getElementById('main-section').style.display = "block";
        } else {
            alert("Código inválido!");
        }
    }

    function gerarLista() {
        const out = document.getElementById('output');
        const status = document.getElementById('status-txt');
        
        status.innerText = "🟡 STATUS: BYPASSING...";
        
        setTimeout(() => {
            status.innerText = "🟢 STATUS: LISTA PRONTA (81 ON)";
            out.innerHTML = `💎 VIP APKBUGADO PREMIUM<br><br>
            🔗 URL M3U:<br>
            http://bluebox.click:80/get.php?username=524c283068b001acf4a37f9515741237&password=3cf01a628867c662997c&type=m3u_plus&output=ts<br><br>
            ⚙️ DADOS XTREAM:<br>
            Host: http://bluebox.click:80<br>
            User: 524c283068b001acf4a37f9515...<br><br>
            📅 Vencimento: 30/04/2026`;
        }, 1000);
    }

    function copiar() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text);
        alert("Copiado com sucesso!");
    }
</script>

</body>
</html>
