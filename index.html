<!DOCTYPE html><html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel VIP IPTV</title>
  <style>
    body {
      background: #0f172a;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }.card {
  background: #1e293b;
  padding: 30px;
  border-radius: 20px;
  width: 300px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h1 {
  font-size: 22px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #16a34a;
}

.link {
  margin-top: 15px;
  font-size: 12px;
  word-break: break-all;
  color: #38bdf8;
}

  </style>
</head>
<body>  <div class="card">
    <h1>🔥 Painel VIP IPTV</h1><input type="text" id="host" placeholder="Host (http://servidor.com)">
<input type="text" id="user" placeholder="Usuário">
<input type="password" id="pass" placeholder="Senha">

<button onclick="gerarLista()">GERAR LISTA</button>

<div id="resultado" class="link"></div>

  </div>  <script>
    function gerarLista() {
      const host = document.getElementById('host').value;
      const user = document.getElementById('user').value;
      const pass = document.getElementById('pass').value;

      if (!host || !user || !pass) {
        alert('Preencha tudo!');
        return;
      }

      const url = `${host}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=m3u8`;

      document.getElementById('resultado').innerHTML = `\n        ✅ Lista gerada:<br><br>
        <a href="${url}" target="_blank">${url}</a>
      `;
    }
  </script></body>
</html>
