<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel VIP GitHub</title>
<style>
body{background:#020617;color:#00ff9c;font-family:monospace;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.card{background:#020617;padding:20px;border-radius:15px;width:420px;border:1px solid #00ff9c;text-align:center}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#00ff9c;color:#000;font-weight:bold;cursor:pointer;margin-top:10px}
pre{margin-top:10px;font-size:12px;background:#000;padding:10px;border-radius:10px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="card">
<h3>💎 VIP APKBUGADO (AUTO)</h3><button onclick="gerar()">GERAR LISTA</button> <button onclick="copiar()">COPIAR</button>

<pre id="out">Clique em GERAR...</pre></div>
<script>// 🔗 COLOQUE AQUI SEU TXT DO GITHUB const urlTXT = "https://raw.githubusercontent.com/SEUUSER/SEUREPO/main/combos.txt";

function gerar(){ fetch(urlTXT) .then(res=>res.text()) .then(txt=>{

let banco=[];

let blocos = txt.split("Host");

blocos.forEach(b=>{ let host = (b.match(/(http[^\s]+)/)||[])[1]; let user = (b.match(/Usuário.►\s(.)/)||[])[1]; let pass = (b.match(/Senha.►\s*(.*)/)||[])[1];

if(host && user && pass){ banco.push({host,user,pass}); } });

if(banco.length===0){ document.getElementById('out').textContent="Nenhum combo encontrado!"; return; }

let c = banco[Math.floor(Math.random()*banco.length)];

let m3u = ${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=m3u8;

let txtFinal = 📺 LISTA VIP APKBUGADO\n\n🔗 M3U:\n${m3u}\n\n⚙️ XTREAM:\nHost: ${c.host}\nUser: ${c.user}\nPass: ${c.pass};

document.getElementById('out').textContent = txtFinal;

}) .catch(()=>{ document.getElementById('out').textContent="Erro ao carregar combos!"; }); }

function copiar(){ let texto=document.getElementById('out').textContent; navigator.clipboard.writeText(texto); alert('Copiado!'); }

</script>
</body>
</html>
