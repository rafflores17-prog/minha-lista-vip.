<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP APKBUGADO MASTER</title>
<style>
    /* Estilo Cyberpunk / Hacker */
    :root {
        --neon-green: #00ff9c;
        --neon-purple: #9d00ff;
        --dark-bg: #020617;
        --darker-bg: #000000;
    }

    body {
        background: var(--dark-bg);
        color: var(--neon-green);
        font-family: 'Courier New', Courier, monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        padding: 10px;
        box-sizing: border-box;
    }

    .card {
        background: var(--dark-bg);
        padding: 20px;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        border: 1px solid var(--neon-purple);
        text-align: center;
        box-shadow: 0 0 15px rgba(157, 0, 255, 0.3), inset 0 0 10px rgba(0, 255, 156, 0.1);
        position: relative;
    }

    .logo-img {
        width: 70px;
        margin-bottom: 10px;
        filter: drop-shadow(0 0 5px var(--neon-green));
    }

    h3 {
        margin: 0 0 15px 0;
        letter-spacing: 2px;
        color: var(--neon-green);
        text-shadow: 0 0 5px var(--neon-green);
    }

    button, input, a {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        margin-top: 10px;
        text-decoration: none;
        display: block;
        box-sizing: border-box;
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
        transition: 0.3s ease;
    }

    button {
        background: var(--neon-green);
        color: #000;
        cursor: pointer;
        text-transform: uppercase;
    }

    button:hover:not(:disabled) {
        background: var(--neon-purple);
        color: #fff;
        box-shadow: 0 0 10px var(--neon-purple);
    }

    button:disabled {
        background: #333;
        color: #666;
        cursor: not-allowed;
    }

    input {
        background: var(--darker-bg);
        color: var(--neon-green);
        text-align: center;
        border: 1px solid #333;
        outline: none;
    }

    input:focus {
        border-color: var(--neon-green);
    }

    .link-pills {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 10px;
    }

    .link-pills a {
        background: #001f1a;
        color: var(--neon-green);
        font-size: 11px;
        width: auto;
        padding: 8px 15px;
    }

    .link-pills a:hover {
        background: var(--neon-green);
        color: #000;
    }

    pre {
        margin-top: 15px;
        font-size: 12px;
        background: var(--darker-bg);
        padding: 15px;
        border-radius: 8px;
        white-space: pre-wrap;
        text-align: left;
        border: 1px dashed #333;
        color: #fff;
    }

    .status-area {
        font-size: 11px;
        margin-top: 8px;
        color: #aaa;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .highlight-text { color: var(--neon-green); }
    .error-text { color: #ff5555; }
</style>
</head>
<body>

<div class="card">
    <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" class="logo-img" alt="Lock">
    <h3>[ VIP_PAINEL ]</h3>
    
    <div id="login-form">
        <input type="password" id="senha" placeholder="Insira a key de acesso">
        <button id="btn-acessar" onclick="desbloquear()">✅ ACESSAR</button>
    </div>

    <div id="painel" style="display:none;">
        <div class="link-pills">
            <a href="https://is.gd/th2b0P" target="_blank">💎 VIP GRUPO</a> 
            <a href="https://t.me/ApkBugado" target="_blank">📢 CANAL OFICIAL</a>
        </div>
        
        <button id="btn-gerar" onclick="gerar()">⚡ GERAR LISTA ATIVA</button>
        <button onclick="copiar()" style="background: #222; color: #fff; border: 1px solid #444; font-size: 12px; padding: 10px;">📋 COPIAR DADOS</button>
        
        <div class="status-area">
            <span id="scan" class="highlight-text">Aguardando comando...</span>
            <span id="info">📊 Hosts na base: 0 | Já geradas: 0</span>
        </div>
        
        <pre id="out">Output vazio...</pre>
    </div>
</div>

<script>
    // Configurações e Chaves
    const senhaCorreta = "1234";
    const base = "https://raw.githubusercontent.com/rafflores17-prog/painel-vip/main/";
    const total = 2; // Quantidade de arquivos comboX.txt no github
    
    // Lista de chaves (usuário+senha) já entregues
    let usadas = [];

    // Função de Desbloqueio
    function desbloquear() {
        let s = document.getElementById('senha').value;
        if(s === senhaCorreta) {
            // Oculta o formulário de login e mostra o painel
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('painel').style.display = 'block';
        } else {
            alert("❌ Key Inválida!");
            document.getElementById('senha').value = ''; // Limpa o campo
        }
    }

    // Calcula validade
    function proximoMes() {
        let d = new Date();
        d.setMonth(d.getMonth() + 1);
        return d.toLocaleDateString();
    }

    // Função Principal de Geração
    async function gerar() {
        let btnGerar = document.getElementById('btn-gerar');
        let scan = document.getElementById('scan');
        let out = document.getElementById('out');
        let info = document.getElementById('info');

        // Impede cliques múltiplos desativando o botão
        btnGerar.disabled = true;
        btnGerar.textContent = "⏳ PROCESSANDO...";

        let etapas = [
            "🔍 Buscando servidor...",
            "🌐 Conectando à base...",
            "📡 Minerando combos...",
            "⚙️ Validando integridade...",
            "✅ Finalizando script..."
        ];

        // Animação de status hacker
        for(let i=0; i < etapas.length; i++) {
            scan.textContent = etapas[i];
            await new Promise(r => setTimeout(r, 400));
        }

        let tentativas = 0;
        let sucesso = false;

        // Tenta 10 vezes até achar uma lista nova/ativa
        while(tentativas < 10 && !sucesso) {
            try {
                let n = Math.floor(Math.random() * total) + 1;
                let url = `${base}combo${n}.txt`;

                let res = await fetch(url);
                if (!res.ok) throw new Error("Falha no fetch");
                let txt = await res.text();

                // Divide pelo separador único
                let blocos = txt.split(/┏●-•~¹°”ˆ˜¨/);
                let validos = [];

                blocos.forEach(b => {
                    // BUG FIX: O .trim() salva a vida aqui. Limpa espaços invisíveis e quebras de linha que quebravam o link M3U.
                    let host = (b.match(/Host[:►]\s*(http[^\s]+)/i) || [])[1]?.trim();
                    let user = (b.match(/Usu[aá]rio[:►]\s*(.*)/i) || [])[1]?.trim();
                    let pass = (b.match(/Senha[:►]\s*(.*)/i) || [])[1]?.trim();

                    if(host && user && pass) {
                        let chave = user + pass;
                        // BUG FIX: Checa se a lista JÁ foi gerada hoje
                        if(!usados.includes(chave)){
                            validos.push({host, user, pass, chave});
                        }
                    }
                });

                if(validos.length === 0) {
                    // BUG FIX: NÃO zerar o usadas aqui. Só continua para o próximo arquivo.
                    tentativas++;
                    continue; 
                }

                // Sorteia um dos válidos
                let c = validos[Math.floor(Math.random() * validos.length)];
                // Marca como usada
                usados.push(c.chave);

                let m3u = `${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=m3u8`;
                let agora = new Date().toLocaleString();
                let exp = proximoMes();

                let resultado = `📺 VIP APKBUGADO PREMIUM\n\n🔗 M3U URL:\n${m3u}\n\n⚙️ XTREAM DADOS:\nHost: ${c.host}\nUser: ${c.user}\nPass: ${c.pass}\n\n📅 Vencimento: ${exp}\n━━━━━━━━━━━━━━━━━━━━━\n⏱️ Gerado em: ${agora}`;

                out.textContent = resultado;
                scan.textContent = "🟢 STATUS: LISTA PRONTA";
                info.textContent = `📊 Hosts na base: ${validos.length} | Já geradas: ${usados.length}`;
                
                sucesso = true; // Sai do loop while

            } catch(e) {
                tentativas++;
                console.error("Erro na tentativa", tentativas, e);
            }
        }

        // Se após 10 tentativas não achar nada
        if(!sucesso) {
            out.textContent = "❌ Falha ao encontrar lista ativa ou servidor indisponível. Recarregue a página.";
            scan.textContent = "🔴 STATUS: ERRO DE CONEXÃO";
            info.textContent = ""; // Limpa estatísticas antigas
        }

        // Reativa o botão
        btnGerar.disabled = false;
        btnGerar.textContent = "⚡ GERAR NOVA LISTA";
    }

    // Função de Copiar
    function copiar() {
        let texto = document.getElementById('out').textContent;
        // Evita copiar a mensagem de erro ou output vazio
        if(texto.includes("Output vazio") || texto.includes("Falha")) {
            alert('⚠️ Gere uma lista primeiro!');
            return;
        }
        navigator.clipboard.writeText(texto);
        alert('✅ Lista copiada!');
    }
</script>
</body>
</html>
