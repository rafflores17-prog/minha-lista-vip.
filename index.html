<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP GERADOR APKBUGADO</title>

<style>
    /* Visual Hacker / Cyberpunk */
    :root {
        --neon: #00ff9c;
        --roxo: #9d00ff;
        --bg: #020617;
    }

    body {
        background: var(--bg);
        color: var(--neon);
        font-family: 'Courier New', Courier, monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 10px;
        box-sizing: border-box;
    }

    .card {
        background: var(--bg);
        width: 100%;
        max-width: 400px;
        padding: 25px 20px;
        border: 1px solid var(--roxo);
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 0 15px rgba(157, 0, 255, 0.3), inset 0 0 10px rgba(0, 255, 156, 0.1);
    }

    h3 {
        margin-top: 0;
        letter-spacing: 2px;
        text-shadow: 0 0 5px var(--neon);
    }

    button, input {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        box-sizing: border-box;
        font-family: inherit;
        font-weight: bold;
    }

    input {
        background: #000;
        color: var(--neon);
        border: 1px solid #333;
        text-align: center;
        outline: none;
    }

    input:focus { border-color: var(--neon); }

    button {
        background: var(--neon);
        color: #000;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover:not(:disabled) {
        background: var(--roxo);
        color: #fff;
        box-shadow: 0 0 10px var(--roxo);
    }

    button:disabled {
        background: #333;
        color: #666;
        cursor: not-allowed;
    }

    pre {
        background: #000;
        padding: 15px;
        margin-top: 15px;
        text-align: left;
        border-radius: 8px;
        border: 1px dashed #333;
        font-size: 12px;
        white-space: pre-wrap;
        color: #fff;
    }

    .stats {
        font-size: 11px;
        color: #aaa;
        margin-top: 10px;
    }
    .destaque { color: var(--neon); }
</style>
</head>

<body>

<div class="card">
    <h3>💻 PAINEL VIP</h3>

    <div id="box-login">
        <input type="password" id="senha" placeholder="Código de Acesso">
        <button onclick="login()">ENTRAR NO SISTEMA</button>
    </div>

    <div id="painel" style="display:none;">
        <button id="btn-gerar" onclick="gerar()">⚡ GERAR CONTA</button>
        <button onclick="copiar()" style="background: #222; color: #fff; border: 1px solid #444;">📋 COPIAR</button>
        
        <div class="stats" id="info-status">Aguardando...</div>
        
        <pre id="out">Output limpo...</pre>
    </div>
</div>

<script>
const senhaCorreta = "1234";

// 🔥 Seus Combos
const base = "https://raw.githubusercontent.com/rafflores17-prog/painel-vip/main/";
const arquivos = ["combo1.txt", "combo2.txt"];

// Variáveis Globais para manter os dados na memória
let listaGlobal = [];
let usados = [];

// 1. LOGIN
async function login() {
    let s = document.getElementById('senha').value.trim();
    if (s === senhaCorreta) {
        document.getElementById('box-login').style.display = "none";
        document.getElementById('painel').style.display = "block";
        
        // Inicia o download das listas UMA única vez
        await carregarBanco();
    } else {
        alert("❌ Código inválido!");
    }
}

// 2. DATA FAKE
function proximoMes() {
    let d = new Date();
    d.setMonth(d.getMonth() + 1);
    return d.toLocaleDateString();
}

// 3. PARSER INTELIGENTE CORRIGIDO
function extrairCombos(texto) {
    let lista = [];

    // Correção: Uma única barra invertida para regex literal (\s = espaço, \n = quebra de linha)
    let regexHost = /http[^\s]+:[0-9]+/g;
    let regexUser = /Usu[aá]rio[:►]\s*([^\n\r]+)/gi;
    let regexPass = /Senha[:►]\s*([^\n\r]+)/gi;

    let hosts = texto.match(regexHost) || [];
    let matchUser = [...texto.matchAll(regexUser)];
    let matchPass = [...texto.matchAll(regexPass)];

    // Limpa pegando apenas o Grupo 1 da captura (o que vem depois dos dois pontos)
    let users = matchUser.map(m => m[1].trim());
    let passes = matchPass.map(m => m[1].trim());

    // Junta tudo pelo índice
    let limite = Math.min(users.length, passes.length);
    for (let i = 0; i < limite; i++) {
        // Se faltar host, repete o primeiro para não quebrar a lista
        let host = hosts[i] || hosts[0] || "http://host-padrao.com"; 
        if (host && users[i] && passes[i]) {
            lista.push({
                host: host,
                user: users[i],
                pass: passes[i],
                key: users[i] + passes[i]
            });
        }
    }
    return lista;
}

// 4. DOWNLOAD ÚNICO DA MEMÓRIA
async function carregarBanco() {
    let btn = document.getElementById('btn-gerar');
    let info = document.getElementById('info-status');
    let out = document.getElementById('out');
    
    btn.disabled = true;
    out.textContent = "📡 Conectando ao banco de dados no GitHub...";

    let tudo = [];
    for (let f of arquivos) {
        try {
            let r = await fetch(base + f);
            if(r.ok) {
                let txt = await r.text();
                let combos = extrairCombos(txt);
                tudo = tudo.concat(combos);
            }
        } catch (e) {
            console.error("Erro ao puxar:", f);
        }
    }

    // Remove duplicados gerais do banco
    let unico = {};
    tudo.forEach(c => unico[c.key] = c);
    listaGlobal = Object.values(unico);

    info.innerHTML = `✅ <span class="destaque">${listaGlobal.length}</span> hosts carregados na memória.`;
    out.textContent = "SISTEMA PRONTO. Clique em GERAR.";
    btn.disabled = false;
}

// 5. GERAR INSTANTÂNEO
function gerar() {
    let out = document.getElementById('out');
    let info = document.getElementById('info-status');

    if(listaGlobal.length === 0) {
        out.textContent = "❌ Nenhuma lista encontrada nos arquivos txt.";
        return;
    }

    // Filtra quem ainda não foi usado
    let disponivel = listaGlobal.filter(c => !usados.includes(c.key));

    // Se usou tudo, reseta para começar de novo
    if (disponivel.length === 0) {
        usados = [];
        disponivel = listaGlobal;
    }

    // Pega um aleatório
    let c = disponivel[Math.floor(Math.random() * disponivel.length)];
    usados.push(c.key); // Marca como usado

    let m3u = `${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=m3u8`;

    out.textContent = `📺 LISTA VIP PREMIUM\n\n🔗 M3U URL:\n${m3u}\n\n⚙️ DADOS XTREAM\nHost: ${c.host}\nUser: ${c.user}\nPass: ${c.pass}\n\n📅 Vencimento: ${proximoMes()}`;
    
    info.innerHTML = `📊 Base: ${listaGlobal.length} | <span class="destaque">Geradas: ${usados.length}</span>`;
}

// 6. COPIAR
function copiar() {
    let texto = document.getElementById('out').textContent;
    if(texto.includes("limpo") || texto.includes("PRONTO")) {
        alert("⚠️ Gere uma lista primeiro!");
        return;
    }
    navigator.clipboard.writeText(texto);
    alert("✅ Copiado para a área de transferência!");
}
</script>

</body>
</html>
