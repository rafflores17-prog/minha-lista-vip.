<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP_PAINEL APKBUGADO</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .painel-vip {
            width: 100%;
            max-width: 360px;
            background: #000;
            border: 2px solid #00ff9c;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 156, 0.4);
            text-align: center;
            box-sizing: border-box;
        }

        .titulo-neon {
            color: #00ff9c;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-shadow: 0 0 5px #00ff9c;
        }

        .cadeado-main {
            width: 140px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px #00ff9c);
        }

        .grid-atalhos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-atalho {
            background: rgba(0, 255, 156, 0.1);
            border: 1px solid #00ff9c;
            color: #00ff9c;
            padding: 10px;
            border-radius: 10px;
            font-size: 10px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #00ff9c33;
            border-radius: 10px;
            color: #fff;
            margin-bottom: 10px;
            box-sizing: border-box;
            text-align: center;
        }

        .btn-principal {
            width: 100%;
            padding: 14px;
            background: #00ff9c;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px #00ff9c;
        }

        /* 🛡️ BOX DE RESULTADO PROTEGIDA */
        .caixa-dados {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 15px;
            margin-top: 20px;
            padding: 15px;
            text-align: left;
            font-size: 12px;
            color: #ccc;
            line-height: 1.6;
            /* Trava de segurança crucial */
            white-space: pre-wrap;
            word-break: break-all;
            display: none; /* Oculto até clicar em gerar */
        }

        .status-on {
            color: #00ff9c;
            font-size: 11px;
            margin: 10px 0;
            font-weight: bold;
            display: none;
        }

        .btn-copia {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: #00ff9c;
            border: 1px solid #00ff9c;
            border-radius: 10px;
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="painel-vip">
    <div class="titulo-neon">[ VIP_PAINEL ]</div>
    
    <img src="1000156293.png" class="cadeado-main" alt="VIP">

    <div class="grid-atalhos">
        <a href="https://t.me/ApkBugadoGrupo" class="btn-atalho">💎 GRUPO VIP</a>
        <a href="https://t.me/ApkBugado" class="btn-atalho">📢 CANAL</a>
    </div>

    <div id="area-login">
        <input type="password" id="key" placeholder="Digite código VIP">
        <button class="btn-principal" onclick="validar()">DESBLOQUEAR</button>
    </div>

    <div id="area-gerador" style="display:none;">
        <button class="btn-principal" onclick="gerar()">⚡ GERAR NOVA LISTA PREMIUM</button>
        
        <div class="status-on" id="status-txt">🟢 STATUS: LISTA PRONTA (81 ON)</div>

        <div class="caixa-dados" id="box-result">
            💎 <span style="color:#00ff9c">VIP APKBUGADO PREMIUM</span><br><br>
            🔗 URL M3U:<br>
            <span id="link-m3u" style="color:#fff"></span><br><br>
            ⚙️ DADOS XTREAM:<br>
            Host: <span id="xtream-host"></span><br>
            User: <span id="xtream-user"></span><br>
            Pass: <span id="xtream-pass"></span><br><br>
            📅 Vencimento: 30/04/2026
        </div>

        <button class="btn-copia" id="btn-copia" onclick="copiar()">📋 COPIAR DADOS</button>
    </div>
</div>

<script>
    function validar() {
        const pass = document.getElementById('key').value;
        if(pass === "9085") {
            document.getElementById('area-login').style.display = "none";
            document.getElementById('area-gerador').style.display = "block";
        } else {
            alert("Código VIP inválido!");
        }
    }

    function gerar() {
        // Exemplo de link que costuma quebrar o layout
        const urlM3U = "http://bluebox.click:80/get.php?username=524c283068b001acf4a37f9515741237&password=3cf01a628867c662997c&type=m3u_plus&output=ts";
        
        document.getElementById('link-m3u').innerText = urlM3U;
        document.getElementById('xtream-host').innerText = "http://bluebox.click:80";
        document.getElementById('xtream-user').innerText = "524c283068b001acf4a37f951...";
        document.getElementById('xtream-pass').innerText = "3cf01a628867c662997c";
        
        document.getElementById('status-txt').style.display = "block";
        document.getElementById('box-result').style.display = "block";
        document.getElementById('btn-copia').style.display = "block";
    }

    function copiar() {
        const texto = document.getElementById('box-result').innerText;
        navigator.clipboard.writeText(texto);
        alert("Copiado!");
    }
</script>

</body>
</html>
