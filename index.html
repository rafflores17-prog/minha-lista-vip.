<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VIP GERADOR</title>

<style>
body{background:#000;color:#00ff9c;font-family:monospace;text-align:center}
.card{margin:50px auto;width:400px;padding:20px;border:1px solid #00ff9c;border-radius:15px}
button,input{width:100%;padding:10px;margin-top:10px}
pre{background:#000;padding:10px;margin-top:10px;text-align:left}
</style>
</head>

<body>

<div class="card">
<h3>💻 GERADOR VIP</h3>

<input type="password" id="senha" placeholder="Código">
<button onclick="login()">ENTRAR</button>

<div id="painel" style="display:none;">
<button onclick="gerar()">GERAR</button>
<pre id="out">...</pre>
</div>

</div>

<script>

const senhaCorreta = "1234";

// 🔥 seus combos
const base = "https://raw.githubusercontent.com/rafflores17-prog/painel-vip/main/";
const arquivos = ["combo1.txt","combo2.txt"];

let usados = [];

function login(){
 let s = document.getElementById('senha').value.trim();
 if(s===senhaCorreta){
  document.getElementById('painel').style.display="block";
 }
}

// 📅 expiração fake
function proximoMes(){
 let d=new Date();
 d.setMonth(d.getMonth()+1);
 return d.toLocaleDateString();
}

// 🔥 parser inteligente (funciona com QUALQUER formato)
function extrairCombos(texto){

 let lista=[];

 // pega todos possíveis hosts
 let hosts = texto.match(/http[^\\s]+:[0-9]+/g) || [];

 // pega usuários
 let users = texto.match(/Usu[aá]rio[:►]\\s*([^\\n]+)/gi) || [];

 // pega senhas
 let pass = texto.match(/Senha[:►]\\s*([^\\n]+)/gi) || [];

 // limpa
 users = users.map(x=>x.split(/[:►]/)[1].trim());
 pass = pass.map(x=>x.split(/[:►]/)[1].trim());

 // junta
 for(let i=0;i<users.length;i++){
   let host = hosts[i] || hosts[0];
   if(host && users[i] && pass[i]){
     lista.push({
       host,
       user: users[i],
       pass: pass[i],
       key: users[i]+pass[i]
     });
   }
 }

 return lista;
}

// 🔥 carrega tudo
async function carregar(){

 let tudo=[];

 for(let f of arquivos){
   try{
     let r = await fetch(base+f);
     let txt = await r.text();

     let combos = extrairCombos(txt);
     tudo = tudo.concat(combos);

   }catch(e){}
 }

 // remove duplicados
 let unico = {};
 tudo.forEach(c => unico[c.key]=c);

 return Object.values(unico);
}

// 🚀 GERAR
async function gerar(){

 let out = document.getElementById('out');
 out.textContent="Carregando...";

 let lista = await carregar();

 // remove usados
 let disponivel = lista.filter(c=>!usados.includes(c.key));

 if(disponivel.length===0){
   usados=[];
   disponivel=lista;
 }

 let c = disponivel[Math.floor(Math.random()*disponivel.length)];
 usados.push(c.key);

 let m3u = `${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=m3u8`;

 out.textContent = `📺 LISTA VIP APKBUGADO

🔗 ${m3u}

⚙️ XTREAM
Host: ${c.host}
User: ${c.user}
Pass: ${c.pass}

📅 Expira: ${proximoMes()}`;

}

</script>

</body>
</html>
