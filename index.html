<script>

const senhaCorreta = "1234";
const base = "https://raw.githubusercontent.com/rafflores17-prog/painel-vip/main/";
const arquivos = ["combo1.txt","combo2.txt"];

let listaGlobal = [];
let usados = [];

function login(){
 let s = document.getElementById('senha').value.trim();
 if(s === senhaCorreta){
   document.getElementById('painel').style.display = "block";
 }
}

// 📅 expiração fake
function proximoMes(){
 let d = new Date();
 d.setMonth(d.getMonth()+1);
 return d.toLocaleDateString();
}

// 🔥 pega direto M3U (SEM ERRO)
function extrairM3U(texto){

 let matches = texto.match(/http[^\\s]+get\\.php\\?username=[^\\s]+/g) || [];

 return matches.map(link => {
   let url = new URL(link);

   return {
     host: url.origin,
     user: url.searchParams.get("username"),
     pass: url.searchParams.get("password"),
     link: link,
     key: url.searchParams.get("username") + url.searchParams.get("password")
   };
 });
}

// 🔥 carrega tudo UMA VEZ
async function carregar(){

 if(listaGlobal.length > 0) return;

 for(let f of arquivos){
   try{
     let r = await fetch(base + f);
     let txt = await r.text();

     let combos = extrairM3U(txt);
     listaGlobal = listaGlobal.concat(combos);

   }catch(e){}
 }

 // remove duplicados
 let unico = {};
 listaGlobal.forEach(c => unico[c.key] = c);
 listaGlobal = Object.values(unico);
}

// 🚀 GERAR
async function gerar(){

 let out = document.getElementById('out');
 out.textContent = "Carregando...";

 await carregar();

 let disponivel = listaGlobal.filter(c => !usados.includes(c.key));

 if(disponivel.length === 0){
   usados = [];
   disponivel = listaGlobal;
 }

 let c = disponivel[Math.floor(Math.random()*disponivel.length)];
 usados.push(c.key);

 out.textContent = `📺 LISTA VIP APKBUGADO

🔗 ${c.link}

⚙️ XTREAM
Host: ${c.host}
User: ${c.user}
Pass: ${c.pass}

📅 Expira: ${proximoMes()}`;
}

</script>
