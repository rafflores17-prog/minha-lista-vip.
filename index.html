<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAINEL VIP APKBUGADO - ULTRA</title>
<style>
    body {
        background: #000;
        color: #fff;
        font-family: 'Courier New', Courier, monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        /* AQUI ENTRA A SUA FOTO DO CADEADO */
        background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('cadeado.png');
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }

    .card-painel {
        background: rgba(0, 0, 0, 0.85); /* Fundo semi-transparente para ver o cadeado */
        width: 100%;
        max-width: 420px;
        padding: 30px 20px;
        border: 2px solid #00ff9c;
        border-radius: 20px;
        box-shadow: 0 0 30px rgba(0, 255, 156, 0.6);
        text-align: center;
        backdrop-filter: blur(5px); /* Efeito de vidro embaçado */
    }

    .title-vip {
        color: #00ff9c;
        font-size: 22px;
        text-shadow: 0 0 10px #00ff9c;
        margin-bottom: 20px;
        font-weight: bold;
    }

    .links-topo {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    .btn-link {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: bold;
        font-size: 11px;
        border: 1px solid #00ff9c;
        color: #00ff9c;
        background: rgba(0, 77, 47, 0.3);
    }

    button {
        width: 100%;
        padding: 15px;
        margin-top: 10px;
        border-radius: 12px;
        border: none;
        background: #00ff9c;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
        box-shadow: 0 0 15px #00ff9c;
    }

    input {
        width: 100%;
        padding: 15px;
        background: rgba(0,0,0,0.5);
        border: 1px solid #00ff9c;
        color: #fff;
        border-radius: 12px;
        text-align: center;
        margin-bottom: 10px;
        outline: none;
    }

    /* FIX DO LINK M3U QUEBRANDO O LAYOUT */
    pre#out {
        background: rgba(10, 10, 10, 0.9);
        padding: 15px;
        margin-top: 20px;
        border-radius: 12px;
        font-size: 13px;
        text-align: left;
        white-space: pre-wrap;
        word-break: break-all; /* Força quebra de links gigantes */
        border: 1px solid #00ff9c33;
        color: #00ff9c;
    }

    .status-msg {
        color: #00ff9c;
        font-size: 12px;
        margin-top: 15px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="card-painel">
    <div class="title-vip">[ VIP_PAINEL ]</div>
    
    <div class="links-topo">
        <a href="#" class="btn-link">💎 GRUPO VIP</a>
        <a href="#" class="btn-link">📢 CANAL</a>
    </div>

    <div id="login-box">
        <input type="password" id="senha" placeholder="INSIRA SEU CÓDIGO">
        <button onclick="login()">DESBLOQUEAR SISTEMA</button>
    </div>

    <div id="painel" style="display:none;">
        <button onclick="gerar()">⚡ GERAR NOVA LISTA PREMIUM</button>
        <div class="status-msg" id="status">SISTEMA PRONTO</div>
        <pre id="out">Aguardando geração...</pre>
        <button onclick="copiar()" style="background:#111; color:#00ff9c; border:1px solid #00ff9c; margin-top:10px;">📋 COPIAR DADOS</button>
    </div>
</div>

<script>
    // Mesma lógica anterior, Mestre!
    function login() {
        let s = document.getElementById('senha').value;
        if(s === "9085") {
            document.getElementById('painel').style.display = "block";
            document.getElementById('login-box').style.display = "none";
        } else { alert("Código incorreto!"); }
    }

    function gerar() {
        document.getElementById('status').textContent = "🟡 STATUS: BYPASSING...";
        setTimeout(() => {
            document.getElementById('status').textContent = "🟢 STATUS: LISTA PRONTA (81 ON)";
            document.getElementById('out').textContent = "💎 VIP APKBUGADO PREMIUM\n\n🔗 URL M3U:\nhttp://servidor-muito-longo-que-nao-quebra-o-layout-mais.com/get.php?user=mestre&pass=123\n\n📅 Vencimento: 30/04/2026";
        }, 1000);
    }

    function copiar() {
        let t = document.getElementById('out').textContent;
        navigator.clipboard.writeText(t);
        alert("Copiado!");
    }
</script>

</body>
</html>
